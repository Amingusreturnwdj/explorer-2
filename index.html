<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorer Mate - AI Companion Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- UI Overlay Navigation -->
    <nav class="top-nav glass-panel">
        <div class="logo">
            <i class="fa-solid fa-earth-americas"></i> Explorer Mate
        </div>
        <div class="nav-actions">
            <button id="btn-location" class="icon-btn tooltip" data-tooltip="ตำแหน่งปัจจุบัน"><i class="fa-solid fa-location-crosshairs"></i></button>
            <button id="btn-add-place" class="icon-btn tooltip hidden" data-tooltip="เพิ่มสถานที่"><i class="fa-solid fa-plus"></i></button>
            <div id="user-profile" class="user-profile hidden">
                <img id="user-avatar" src="" alt="User" class="avatar">
                <button id="btn-logout" class="icon-btn tooltip" data-tooltip="ออกจากระบบ"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
            <button id="btn-login" class="primary-btn"><i class="fa-brands fa-google"></i> เข้าสู่ระบบ</button>
            <button id="btn-toggle-ai" class="icon-btn highlight-btn tooltip" data-tooltip="AI คู่หู"><i class="fa-solid fa-robot"></i></button>
        </div>
    </nav>

    <!-- AI Mate Sidebar -->
    <aside id="ai-sidebar" class="ai-sidebar glass-panel closed">
        <div class="sidebar-header">
            <h3><i class="fa-solid fa-robot text-primary"></i> AI Mate</h3>
            <button id="btn-close-ai" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="chat-container" id="chat-container">
            <div class="message ai">
                <div class="msg-bubble">สวัสดีครับ! ผมคือ AI คู่หูของคุณ ให้ผมแนะนำสถานที่ท่องเที่ยวหรือร้านอาหารใกล้ๆ คุณไหมครับ?</div>
            </div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="chat-input" placeholder="ถามข้อมูลสถานที่ หรือขอคำแนะนำ...">
            <button id="btn-send-msg" class="primary-btn icon-only"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </aside>

    <!-- Add/Edit Place Modal -->
    <div id="modal-place" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3 id="modal-place-title">เพิ่มร้านค้า / สถานที่ท่องเที่ยว</h3>
                <button id="btn-close-modal" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="form-place">
                    <input type="hidden" id="place-id">
                    <div class="form-group">
                        <label for="place-name">ชื่อสถานที่ <span class="text-danger">*</span></label>
                        <input type="text" id="place-name" required>
                    </div>
                    <div class="form-group">
                        <label for="place-desc">รายละเอียด / แนะนำ</label>
                        <textarea id="place-desc" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="place-lat">ละติจูด <span class="text-danger">*</span></label>
                            <input type="number" step="any" id="place-lat" required readonly>
                        </div>
                        <div class="form-group">
                            <label for="place-lng">ลองจิจูด <span class="text-danger">*</span></label>
                            <input type="number" step="any" id="place-lng" required readonly>
                        </div>
                    </div>
                    <p class="text-muted text-sm"><i class="fa-solid fa-info-circle"></i> เลื่อนหมุดบนแผนที่เพื่อระบุตำแหน่ง</p>
                    <button type="submit" class="primary-btn full-width mt-2">บันทึกสถานที่</button>
                    <button type="button" id="btn-delete-place" class="danger-btn full-width mt-2 hidden">ลบสถานที่นี้</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/map.js"></script>
    <script type="module" src="js/ai.js"></script>
    <script type="module" src="js/app.js"></script>

    <!-- Google Maps script will be loaded dynamically via config/map.js -->
</body>
</html>
